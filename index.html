<!DOCTYPE html>
<!-- Squarespace: paste into a Code Block and set display mode to HTML (not Markdown). -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERA Map Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teachers:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: "Teachers", sans-serif;
    }

    #viz {
      max-width: 975px;
      margin: 0 auto;
      padding: 16px;
      position: relative;
    }

    #filters {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      justify-content: flex-start;
      margin-bottom: 12px;
      padding-bottom: 4px;
    }

    .filter-btn {
      --btn-fill: #ccc;
      --btn-on-fill-text: #222;
      --frame-width: 3px;
      position: relative;
      border: none;
      background: #fff;
      color: #222;
      padding: 7px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.3;
      text-align: left;
      min-width: 0;
      min-height: 0;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      transition: color 0.2s ease;
    }

    /* Colored frame on all four sides (supports solid + gradient fills) */
    .filter-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: var(--frame-width);
      background: var(--btn-fill);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.2s ease;
    }

    /* Fill / bottom bar (supports solid + gradient fills) */
    .filter-btn::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--frame-width);
      background: var(--btn-fill);
      transition: height 0.2s ease, bottom 0.2s ease;
      pointer-events: none;
      z-index: 0;
    }

    .filter-btn:hover:not(.active)::after {
      height: calc(var(--frame-width) + 4px);
      bottom: -4px;
    }

    .filter-btn.active {
      color: var(--btn-on-fill-text);
    }

    .filter-btn.active::before {
      opacity: 0;
    }

    .filter-btn.active::after {
      height: calc(100% + 4px);
      bottom: -4px;
    }

    .filter-btn--placeholder {
      background: #ebebeb;
      cursor: default;
      pointer-events: none;
    }

    .filter-btn--placeholder::before,
    .filter-btn--placeholder::after {
      display: none;
    }

    .filter-btn .label {
      position: relative;
      z-index: 1;
      font-weight: 600;
      min-width: 0;
    }

    .filter-btn .count {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.75em;
      height: 1.75em;
      border-radius: 50%;
      background: var(--btn-fill);
      color: var(--btn-on-fill-text);
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .filter-btn.active .count {
      background: #fff;
      color: #000;
    }

    #map-frame {
      position: relative;
      border: 1px solid #000;
      aspect-ratio: 975 / 610;
      overflow: hidden;
    }

    #map-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      z-index: 5;
      pointer-events: none;
    }

    #map-loading.hidden {
      display: none;
    }

    #map svg {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    #map path.state {
      transition: fill 0.3s, opacity 0.25s;
      cursor: pointer;
    }

    .tooltip {
      position: absolute;
      display: none;
      visibility: hidden;
      border: 2px solid #000;
      background: #fff;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.4;
      max-width: 280px;
      pointer-events: none;
      z-index: 10;
    }

    .tooltip.visible {
      display: block;
      visibility: visible;
    }

    .tooltip-name {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .tooltip-category {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .tooltip-swatch {
      width: 14px;
      height: 14px;
      border: 1px solid #000;
      flex-shrink: 0;
    }

    .tooltip-background {
      font-size: 12px;
      color: #333;
      white-space: pre-line;
    }

    #state-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 33.333%;
      height: 100%;
      box-sizing: border-box;
      border-left: 2px solid #000;
      background: #fff;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.4;
      z-index: 6;
      transform: translateX(100%);
      transition: transform 750ms cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    #state-panel.visible {
      transform: translateX(0);
      pointer-events: auto;
    }

    .state-panel-header {
      position: relative;
      padding: 14px 40px 14px 14px;
      border-bottom: 1px solid #000;
    }

    .state-panel-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border: 2px solid #000;
      background: #fff;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .state-panel-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .state-panel-category {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .state-panel-swatch {
      width: 14px;
      height: 14px;
      border: 1px solid #000;
      flex-shrink: 0;
    }

    .state-panel-tabs {
      display: flex;
      border-bottom: 1px solid #000;
    }

    .state-panel-tab {
      flex: 1 1 0;
      min-width: 0;
      box-sizing: border-box;
      border: none;
      border-right: 1px solid #000;
      background: #ebebeb;
      padding: 10px 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .state-panel-tab:last-child {
      border-right: none;
    }

    .state-panel-tab.active {
      background: #fff;
      box-shadow: inset 0 -2px 0 0 #000;
    }

    .state-panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .state-panel-pane {
      display: none;
      font-size: 12px;
      color: #333;
      white-space: pre-line;
    }

    .state-panel-pane.active {
      display: block;
    }

    .state-panel-pane em {
      color: #666;
    }

    #map-controls {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #palette-selector {
      text-align: left;
      font-size: 13px;
    }

    #palette-selector label {
      margin-right: 8px;
    }

    #palette-select {
      font-family: inherit;
      font-size: 13px;
      padding: 4px 8px;
    }

    @media (max-width: 700px) {
      #filters {
        flex-direction: column;
        flex-wrap: nowrap;
      }

      .filter-btn {
        width: 100%;
        min-width: 0;
      }

      #state-panel {
        width: 100%;
        border-left: none;
      }
    }
  </style>
</head>
<body>
  <!-- Copy and paste HTML after this comment into code block, as well as CSS above and script element below. -->
  <div id="viz">
    <div id="filters">
      <button type="button" class="filter-btn filter-btn--placeholder" aria-hidden="true"><span class="label">&nbsp;</span><span class="count">&nbsp;</span></button>
      <button type="button" class="filter-btn filter-btn--placeholder" aria-hidden="true"><span class="label">&nbsp;</span><span class="count">&nbsp;</span></button>
      <button type="button" class="filter-btn filter-btn--placeholder" aria-hidden="true"><span class="label">&nbsp;</span><span class="count">&nbsp;</span></button>
      <button type="button" class="filter-btn filter-btn--placeholder" aria-hidden="true"><span class="label">&nbsp;</span><span class="count">&nbsp;</span></button>
      <button type="button" class="filter-btn filter-btn--placeholder" aria-hidden="true"><span class="label">&nbsp;</span><span class="count">&nbsp;</span></button>
    </div>
    <div id="map-frame">
      <div id="map-loading">Map loading</div>
      <div id="map"></div>
      <div id="state-panel" aria-hidden="true">
        <div class="state-panel-header">
          <button type="button" class="state-panel-close" aria-label="Close">×</button>
          <div class="state-panel-name"></div>
          <div class="state-panel-category">
            <span class="state-panel-swatch"></span>
            <span class="state-panel-status"></span>
          </div>
        </div>
        <div class="state-panel-tabs">
          <button type="button" class="state-panel-tab active" data-tab="review">Federal Standard of Review</button>
          <button type="button" class="state-panel-tab" data-tab="cases">Sex Equality Cases</button>
        </div>
        <div class="state-panel-content">
          <div class="state-panel-pane active" data-pane="review"></div>
          <div class="state-panel-pane" data-pane="cases"></div>
        </div>
      </div>
    </div>
    <div id="map-controls">
      <div id="palette-selector">
        <label for="palette-select">Color palette</label>
        <select id="palette-select" aria-label="Color palette"></select>
      </div>
    </div>
  </div>

  <!-- Modular D3 (selection, geo, scale, transition) — ~half the weight of full d3@7 -->
  <script src="https://cdn.jsdelivr.net/combine/npm/d3-color@3/dist/d3-color.min.js,npm/d3-dispatch@3/dist/d3-dispatch.min.js,npm/d3-ease@3/dist/d3-ease.min.js,npm/d3-interpolate@3/dist/d3-interpolate.min.js,npm/d3-selection@3/dist/d3-selection.min.js,npm/d3-timer@3/dist/d3-timer.min.js,npm/d3-transition@3/dist/d3-transition.min.js,npm/d3-array@3/dist/d3-array.min.js,npm/d3-format@3/dist/d3-format.min.js,npm/d3-time@3/dist/d3-time.min.js,npm/d3-time-format@4/dist/d3-time-format.min.js,npm/d3-scale@4/dist/d3-scale.min.js,npm/d3-geo@3/dist/d3-geo.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
